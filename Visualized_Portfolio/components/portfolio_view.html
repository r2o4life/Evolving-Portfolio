<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Evolving Portfolio Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            border-bottom: 1px solid #334155;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .project-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .tag {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }

        .frameworks {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <header>
        <h1 id="owner">Loading Portfolio...</h1>
        <p id="role" style="color: #94a3b8; margin-bottom: 0.25rem;"></p>
        <div id="contact-info" style="color: #cbd5e1; font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.5;"></div>
        <small id="sync" style="color: #64748b;"></small>
    </header>
    <main id="portfolio-root"></main>

    <script>
        // Reads the local state file directly, with a cache-buster so the browser always gets the latest sync
        fetch('../portfolio_state.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const meta = data.portfolio_metadata;
                document.getElementById('owner').innerText = meta.owner;
                document.getElementById('role').innerText = meta.role;
                document.getElementById('sync').innerText = `Last Loop Sync: ${data.last_sync_timestamp || 'Never'}`;

                if (meta.email && meta.phone) {
                    document.getElementById('contact-info').innerHTML = `
                        <a href="mailto:${meta.email}" style="color: #3b82f6; text-decoration: none;">${meta.email}</a> • ${meta.phone}<br>
                        📍 ${meta.location_preferences}<br>
                        🔗 <a href="${meta.linkedin}" target="_blank" style="color: #3b82f6; text-decoration: none;">LinkedIn</a>
                    `;
                }

                const root = document.getElementById('portfolio-root');
                data.projects.reverse().forEach(proj => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.innerHTML = `
                        ${proj.thumbnail_url ? '<img src="' + proj.thumbnail_url + '" alt="' + proj.title + ' Thumbnail" style="width: 100%; border-radius: 6px; margin-bottom: 1rem; border: 1px solid #334155; object-fit: cover; max-height: 400px;">' : ''}
                        <h2 style="margin-top: 0;">${proj.title}</h2>
                        ${proj.live_url ? '<a href="' + proj.live_url + '" target="_blank" style="display: inline-block; background: #3b82f6; color: white; padding: 0.4rem 1rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; margin-bottom: 1rem; margin-right: 0.5rem;">' + (proj.live_label || 'View Live Project &rarr;') + '</a>' : ''}
                        ${proj.secondary_url ? '<a href="' + proj.secondary_url + '" target="_blank" style="display: inline-block; background: #10b981; color: white; padding: 0.4rem 1rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; margin-bottom: 1rem;">' + (proj.secondary_label || 'Secondary Link &rarr;') + '</a>' : ''}
                        <p><strong>Value Proposition:</strong> ${proj.value_proposition}</p>
                        <p>${proj.summary}</p>
                        <div class="frameworks">
                            <strong>A.C.T. Evaluation:</strong> A: ${proj.act_evaluation.aesthetics} | C: ${proj.act_evaluation.clarity} | T: ${proj.act_evaluation.tone}
                        </div>
                        <div class="frameworks" style="margin-top:0.5rem;">
                            <strong>GEMSG Pillars:</strong> ${proj.gemsg_pillars.join(', ')}
                        </div>
                    `;
                    root.appendChild(card);
                });
            }).catch(err => console.error("Error loading state file. Ensure you are running a local server or checking file paths.", err));
    </script>
</body>

</html>
